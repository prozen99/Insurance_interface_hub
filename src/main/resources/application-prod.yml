spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${INSURANCE_HUB_DB_URL}
    username: ${INSURANCE_HUB_DB_USERNAME}
    password: ${INSURANCE_HUB_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: insurance-hub-prod
      maximum-pool-size: ${INSURANCE_HUB_DB_POOL_MAX:5}
      minimum-idle: ${INSURANCE_HUB_DB_POOL_MIN_IDLE:1}

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false

  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: never

server:
  address: 0.0.0.0
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    jms:
      enabled: false

app:
  file-transfer:
    sftp:
      enabled: ${APP_FILE_TRANSFER_SFTP_ENABLED:false}
    ftp:
      enabled: ${APP_FILE_TRANSFER_FTP_ENABLED:false}
  batch:
    scheduler:
      enabled: ${APP_BATCH_SCHEDULER_ENABLED:false}

logging:
  level:
    root: INFO
    com.insurancehub: INFO
    org.hibernate.SQL: WARN
    org.springframework.security: INFO
