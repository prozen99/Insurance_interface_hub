<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${formTitle} + ' | Insurance Interface Hub'">Partner form</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="app-shell">
    <aside th:replace="~{admin/fragments/sidebar :: sidebar(${activeNav})}"></aside>

    <main class="content">
        <header class="page-header">
            <p class="eyebrow">Partner company</p>
            <h2 th:text="${formTitle}">Create partner company</h2>
            <p class="lead">Use stable partner codes because interface definitions will reference them.</p>
        </header>

        <section class="panel">
            <form class="form-grid" th:action="${formAction}" th:object="${form}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <label>
                    Partner code
                    <input type="text" th:field="*{partnerCode}" placeholder="LIFEPLUS">
                    <span class="field-error" th:if="${#fields.hasErrors('partnerCode')}" th:errors="*{partnerCode}">Required</span>
                </label>
                <label>
                    Partner name
                    <input type="text" th:field="*{partnerName}" placeholder="Life Plus Insurance">
                    <span class="field-error" th:if="${#fields.hasErrors('partnerName')}" th:errors="*{partnerName}">Required</span>
                </label>
                <label>
                    Status
                    <select th:field="*{status}">
                        <option th:each="status : ${statusOptions}" th:value="${status}" th:text="${status}">ACTIVE</option>
                    </select>
                    <span class="field-error" th:if="${#fields.hasErrors('status')}" th:errors="*{status}">Required</span>
                </label>
                <label>
                    Description
                    <textarea th:field="*{description}" placeholder="Operational notes for this partner"></textarea>
                    <span class="field-error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}">Too long</span>
                </label>
                <div class="form-actions">
                    <button class="button primary" type="submit">Save</button>
                    <a class="button" th:href="@{/admin/partners}">Cancel</a>
                </div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
