<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${formTitle} + ' | Insurance Interface Hub'">Interface form</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="app-shell">
    <aside th:replace="~{admin/fragments/sidebar :: sidebar(${activeNav})}"></aside>

    <main class="content">
        <header class="page-header">
            <p class="eyebrow">Interface definition</p>
            <h2 th:text="${formTitle}">Create interface definition</h2>
            <p class="lead">Phase 1 stores master data only. Protocol execution setup will be added in later phases.</p>
        </header>

        <section class="panel">
            <form class="form-grid" th:action="${formAction}" th:object="${form}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <label>
                    Interface code
                    <input type="text" th:field="*{interfaceCode}" placeholder="IF_REST_POLICY_001">
                    <span class="field-error" th:if="${#fields.hasErrors('interfaceCode')}" th:errors="*{interfaceCode}">Required</span>
                </label>
                <label>
                    Interface name
                    <input type="text" th:field="*{interfaceName}" placeholder="Policy status outbound REST interface">
                    <span class="field-error" th:if="${#fields.hasErrors('interfaceName')}" th:errors="*{interfaceName}">Required</span>
                </label>
                <label>
                    Protocol type
                    <select th:field="*{protocolType}">
                        <option th:each="protocol : ${protocolOptions}" th:value="${protocol}" th:text="${protocol}">REST</option>
                    </select>
                    <span class="field-error" th:if="${#fields.hasErrors('protocolType')}" th:errors="*{protocolType}">Required</span>
                </label>
                <label>
                    Direction
                    <select th:field="*{direction}">
                        <option th:each="direction : ${directionOptions}" th:value="${direction}" th:text="${direction}">OUTBOUND</option>
                    </select>
                    <span class="field-error" th:if="${#fields.hasErrors('direction')}" th:errors="*{direction}">Required</span>
                </label>
                <label>
                    Status
                    <select th:field="*{status}">
                        <option th:each="status : ${statusOptions}" th:value="${status}" th:text="${status}">ACTIVE</option>
                    </select>
                    <span class="field-error" th:if="${#fields.hasErrors('status')}" th:errors="*{status}">Required</span>
                </label>
                <label>
                    Partner company
                    <select th:field="*{partnerCompanyId}">
                        <option value="">Select partner</option>
                        <option th:each="partner : ${partnerOptions}"
                                th:value="${partner.id}"
                                th:text="${partner.partnerCode + ' - ' + partner.partnerName}">LIFEPLUS</option>
                    </select>
                    <span class="field-error" th:if="${#fields.hasErrors('partnerCompanyId')}" th:errors="*{partnerCompanyId}">Required</span>
                </label>
                <label>
                    Internal system
                    <select th:field="*{internalSystemId}">
                        <option value="">Select system</option>
                        <option th:each="system : ${systemOptions}"
                                th:value="${system.id}"
                                th:text="${system.systemCode + ' - ' + system.systemName}">POLICY_CORE</option>
                    </select>
                    <span class="field-error" th:if="${#fields.hasErrors('internalSystemId')}" th:errors="*{internalSystemId}">Required</span>
                </label>
                <label>
                    Description
                    <textarea th:field="*{description}" placeholder="Business purpose and operating notes"></textarea>
                    <span class="field-error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}">Too long</span>
                </label>
                <div class="form-actions">
                    <button class="button primary" type="submit">Save</button>
                    <a class="button" th:href="@{/admin/interfaces}">Cancel</a>
                </div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
