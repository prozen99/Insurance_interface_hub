<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="messages">
    <div class="flash flash-success" th:if="${successMessage}" th:text="${successMessage}">Saved.</div>
    <div class="flash flash-error" th:if="${errorMessage}" th:text="${errorMessage}">Error.</div>
</div>
</body>
</html>
